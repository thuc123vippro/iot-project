version: '3.8'

services:
  # 1. Cơ sở dữ liệu MySQL
  db:
    image: mysql:8.0
    container_name: smart-home-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: smarthome_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 2. Máy chủ trung gian MQTT
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: smart-home-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"

  # 3. Máy chủ Backend (NodeJS)
  backend:
    build: ./server
    container_name: smart-home-node
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=db
      - DB_NAME=smarthome_db
    # SỬA TẠI ĐÂY: Bỏ hết dấu gạch ngang ở db và mqtt-broker
    depends_on:
      db:
        condition: service_healthy
      mqtt-broker:
        condition: service_started

  # 4. Giao diện Frontend (React)
  frontend:
    build: ./web-control
    container_name: smart-home-react
    ports:
      - "3000:3000"
    # Frontend chỉ cần đợi backend bật lên là được nên dùng kiểu đơn giản (có dấu gạch ngang)
    depends_on:
      - backend