services:
  db:
    image: sinhviennamhai/iot-db:latest
    container_name: smart-home-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: smart_home_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 10

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: smart-home-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"

  backend:
    image: sinhviennamhai/iot-backend:latest
    container_name: smart-home-node
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: 123456
      DB_NAME: smart_home_db
      MQTT_BROKER: mqtt://mqtt-broker
      MQTT_PORT: 1883
    depends_on:
      db:
        condition: service_healthy
      mqtt-broker:
        condition: service_started

  frontend:
    image: sinhviennamhai/iot-frontend:latest
    container_name: smart-home-react
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
